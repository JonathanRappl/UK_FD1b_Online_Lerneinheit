project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - phases/phase0.qmd
    - phases/phase1.qmd
    - transparenz.qmd

website:
  title: "Alles ist Zahl"
  page-navigation: true
  sidebar:
    style: floating
    search: false
    contents:
      - text: "Start"
        href: index.qmd
      - phases/phase0.qmd
      - phases/phase1.qmd
      - transparenz.qmd
  page-footer:
    left: "Erstellt mit Unterstützung von [Claude](https://www.anthropic.com/claude) (Anthropic)"
    center: "Online-Lerneinheit · Datenrepräsentation · gebaut mit [Quarto](https://quarto.org)"

format:
  html:
    theme: cosmo
    css: styles.css
    callout-icon: false
    include-after-body: widgets.html
    toc: true
    toc-location: right
    toc-title: "Übersicht"
    toc-depth: 2
    number-sections: false
    smooth-scroll: true
    code-fold: true
    code-tools: true
    highlight-style: github
    lang: de
