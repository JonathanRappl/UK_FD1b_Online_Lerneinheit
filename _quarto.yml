project:
  type: website
  output-dir: _site
  render:
    - index.qmd

website:
  title: "Alles ist Zahl"
  page-footer:
    center: "Online-Lerneinheit · Datenrepräsentation · erstellt mit [Quarto](https://quarto.org)"

format:
