<script>
// ‚îÄ‚îÄ Aufdeck-Stepper (schrittweises Aufdecken einer Nachricht) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function _byteCell(ch, level) {
  var code = ch.charCodeAt(0);
  var bits = code.toString(2).padStart(8, '0');
  var html = '<div class="byte-cell"><div class="bits">' + bits + '</div>';
  if (level >= 1) html += '<div class="dec">' + code + '</div>';
  if (level >= 2) html += '<div class="char">' + (ch === ' ' ? '‚ê£' : ch) + '</div>';
  return html + '</div>';
}
function _renderReveal(w) {
  var secret = w.dataset.secret;
  var level = parseInt(w.dataset.level || '0', 10);
  var grid = w.querySelector('.byte-grid');
  grid.innerHTML = Array.from(secret).map(function (c) { return _byteCell(c, level); }).join('');
}
function setReveal(id, level) {
  var w = document.getElementById(id);
  w.dataset.level = level;
  w.querySelectorAll('.reveal-btn').forEach(function (b, i) {
    b.classList.toggle('active', i === level);
  });
  _renderReveal(w);
}

// ‚îÄ‚îÄ Zahlen-Eingabe pr√ºfen ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function checkNumber(id) {
  var w = document.getElementById(id);
  var fb = w.querySelector('.answer-feedback');
  var raw = w.querySelector('.answer-input').value.trim().replace(/['.\s]/g, '');
  if (raw === '') { fb.className = 'answer-feedback'; fb.innerHTML = ''; return; }
  var store = w.querySelector('.answer-store');
  if (Number(raw) === Number(w.dataset.answer)) {
    fb.className = 'answer-feedback show-correct';
    fb.innerHTML = store.querySelector('.msg-correct').innerHTML;
    return;
  }
  var hint = store.querySelector('.msg-hint[data-value="' + raw + '"]');
  fb.className = 'answer-feedback show-wrong';
  fb.innerHTML = hint ? hint.innerHTML : store.querySelector('.msg-wrong').innerHTML;
}

// ‚îÄ‚îÄ Bin√§r-Stellenwert (Bits an-/ausschalten, Summe live) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function _renderBinary(w) {
  var bits = w.dataset.bits.split('');
  var n = bits.length;
  var head = '<div class="binary-row binary-head">';
  var row = '<div class="binary-row binary-bits">';
  for (var i = 0; i < n; i++) {
    var place = Math.pow(2, n - 1 - i);
    head += '<div class="binary-place">' + place + '</div>';
    row += '<button class="binary-bit' + (bits[i] === '1' ? ' on' : '') +
      '" onclick="toggleBit(\'' + w.id + '\',' + i + ')">' + bits[i] + '</button>';
  }
  head += '</div>';
  row += '</div>';
  var sum = 0, parts = [];
  for (var j = 0; j < n; j++) {
    if (bits[j] === '1') { var p = Math.pow(2, n - 1 - j); sum += p; parts.push(p); }
  }
  var calc = parts.length ? parts.join(' + ') + ' = ' : 'kein Bit gesetzt ‚Üí ';
  var result = '<div class="binary-result">' + calc + '<strong>' + sum + '</strong></div>';
  w.innerHTML = head + row + result;
}
function toggleBit(id, i) {
  var w = document.getElementById(id);
  var bits = w.dataset.bits.split('');
  bits[i] = bits[i] === '1' ? '0' : '1';
  w.dataset.bits = bits.join('');
  _renderBinary(w);
}

// ‚îÄ‚îÄ Text-Eingabe pr√ºfen (z. B. ein decodiertes Wort) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function checkText(id) {
  var w = document.getElementById(id);
  var fb = w.querySelector('.answer-feedback');
  var raw = w.querySelector('.answer-input').value.trim();
  if (raw === '') { fb.className = 'answer-feedback'; fb.innerHTML = ''; return; }
  var norm = raw.toLowerCase().replace(/\s+/g, ' ');
  var store = w.querySelector('.answer-store');
  if (norm === String(w.dataset.answer).toLowerCase()) {
    fb.className = 'answer-feedback show-correct';
    fb.innerHTML = store.querySelector('.msg-correct').innerHTML;
    return;
  }
  var hint = store.querySelector('.msg-hint[data-value="' + norm + '"]');
  fb.className = 'answer-feedback show-wrong';
  fb.innerHTML = hint ? hint.innerHTML : store.querySelector('.msg-wrong').innerHTML;
}

// ‚îÄ‚îÄ ASCII-Encoder (eingetippter Text ‚Üí Bits/Zahl/Zeichen pro Byte) ‚îÄ‚îÄ‚îÄ‚îÄ
function _renderEncode(w) {
  var grid = w.querySelector('.byte-grid');
  var text = w.querySelector('.encode-input').value;
  grid.innerHTML = Array.from(text).map(function (c) { return _byteCell(c, 2); }).join('');
}

// ‚îÄ‚îÄ Multiple-Choice pr√ºfen (wie im SQL-Beispiel) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function mcCheck(btn, id) {
  var w = document.getElementById(id);
  if (w.dataset.answered) return;
  w.dataset.answered = '1';
  var correct = btn.dataset.correct === '1';
  w.querySelectorAll('.mc-btn').forEach(function (b) { b.disabled = true; });
  var fb = w.querySelector('.mc-feedback');
  if (correct) {
    btn.classList.add('mc-correct');
    fb.className = 'mc-feedback show-correct';
    fb.innerHTML = w.querySelector('.mc-correct-text').innerHTML;
  } else {
    btn.classList.add('mc-wrong');
    w.querySelectorAll('.mc-btn').forEach(function (b) {
      if (b.dataset.correct === '1') b.classList.add('mc-correct');
    });
    fb.className = 'mc-feedback show-wrong';
    fb.innerHTML = w.querySelector('.mc-wrong-text').innerHTML;
  }
}

// ‚îÄ‚îÄ Pixel-Raster: Bitfolge ‚áÑ Schwarz-Wei√ü-Bild ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function _renderPixel(w) {
  var rows = w.dataset.pattern.split(';');
  var level = parseInt(w.dataset.level || '0', 10);
  var grid = w.querySelector('.pixel-grid');
  grid.innerHTML = rows.map(function (r) {
    var cells = r.split('').map(function (b) {
      var on = (b === '1');
      var cls = 'pixel-cell' + (level >= 1 && on ? ' on' : '');
      return '<div class="' + cls + '">' + (level === 0 ? b : '') + '</div>';
    }).join('');
    return '<div class="pixel-row">' + cells + '</div>';
  }).join('');
}
function setPixel(id, level) {
  var w = document.getElementById(id);
  w.dataset.level = level;
  w.querySelectorAll('.reveal-btn').forEach(function (b, i) {
    b.classList.toggle('active', i === level);
  });
  _renderPixel(w);
}

// ‚îÄ‚îÄ Pixel zeichnen (Kreativit√§t): klickbares Raster ‚Üí Bitfolge ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function _renderDraw(w) {
  var rows = parseInt(w.dataset.rows || '8', 10);
  var cols = parseInt(w.dataset.cols || '8', 10);
  if (!w.dataset.bits) {
    var blank = [];
    for (var i = 0; i < rows; i++) { blank.push('0'.repeat(cols)); }
    w.dataset.bits = blank.join(';');
  }
  var matrix = w.dataset.bits.split(';');
  w.querySelector('.pixel-grid').innerHTML = matrix.map(function (row, ri) {
    return '<div class="pixel-row">' + row.split('').map(function (b, ci) {
      return '<button class="pixel-cell editable' + (b === '1' ? ' on' : '') +
        '" onclick="togglePixel(\'' + w.id + '\',' + ri + ',' + ci + ')"></button>';
    }).join('') + '</div>';
  }).join('');
  var bitsBox = w.querySelector('.pixel-bits');
  if (bitsBox) bitsBox.textContent = matrix.join('\n');
}
function togglePixel(id, ri, ci) {
  var w = document.getElementById(id);
  var m = w.dataset.bits.split(';');
  var row = m[ri].split('');
  row[ci] = (row[ci] === '1') ? '0' : '1';
  m[ri] = row.join('');
  w.dataset.bits = m.join(';');
  _renderDraw(w);
}

// ‚îÄ‚îÄ RGB-Mischer (drei Bytes ‚Üí Farbe) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function _renderRgb(w) {
  var r = +w.dataset.r, g = +w.dataset.g, b = +w.dataset.b;
  w.querySelector('.rgb-preview').style.background = 'rgb(' + r + ',' + g + ',' + b + ')';
  function bin(n) { return n.toString(2).padStart(8, '0'); }
  w.querySelector('.rgb-readout').innerHTML =
    '<div><span class="rgb-dot rgb-dot-r"></span>Rot: <strong>' + r + '</strong> <code>' + bin(r) + '</code></div>' +
    '<div><span class="rgb-dot rgb-dot-g"></span>Gr√ºn: <strong>' + g + '</strong> <code>' + bin(g) + '</code></div>' +
    '<div><span class="rgb-dot rgb-dot-b"></span>Blau: <strong>' + b + '</strong> <code>' + bin(b) + '</code></div>';
}

// ‚îÄ‚îÄ Initialisierung ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('.reveal-widget').forEach(_renderReveal);
  document.querySelectorAll('.binary-widget').forEach(_renderBinary);
  document.querySelectorAll('.answer-widget').forEach(function (w) {
    var inp = w.querySelector('.answer-input');
    if (!inp) return;
    var check = w.dataset.check === 'text' ? checkText : checkNumber;
    inp.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); check(w.id); }
    });
  });
  document.querySelectorAll('.encode-widget').forEach(function (w) {
    _renderEncode(w);
    w.querySelector('.encode-input').addEventListener('input', function () { _renderEncode(w); });
  });
  document.querySelectorAll('.pixel-widget').forEach(_renderPixel);
  document.querySelectorAll('.pixel-draw').forEach(_renderDraw);
  document.querySelectorAll('.rgb-widget').forEach(function (w) {
    w.querySelectorAll('.rgb-slider').forEach(function (s) {
      s.value = w.dataset[s.dataset.ch];
      s.addEventListener('input', function () { w.dataset[s.dataset.ch] = s.value; _renderRgb(w); });
    });
    _renderRgb(w);
  });
});
</script>
